name: K8S  CI

on:
  push:
    branches: [ "main" ]
  
jobs:

  pyapp-ci:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build the Docker image
      run: "docker build -t kevinjcloud/pyapp-gha:${GITHUB_SHA::7} ."

    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
         username: ${{ vars.DOCKERHUB_USERNAME}}
         password: ${{ secrets.DOCKERHUB_TOKEN}}


    - name: Pushing the docker image
      run: docker push kevinjcloud/pyapp-gha:${GITHUB_SHA::7}

    - name: updating the docker image in deployment yaml file
      run: |
        SHORT_SHA=${GITHUB_SHA::7}
        yq -i '.spec.template.spec.containers[0].image = "kevinjcloud/pyapp-gha:${GITHUB_SHA::7}"'  ./eks_manifest/deployment.yaml

   
